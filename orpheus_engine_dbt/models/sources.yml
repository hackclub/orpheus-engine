version: 2

sources:
  - name: hackatime_raw
    schema: hackatime
    tables:
      - name: heartbeats
        description: "Raw heartbeat data replicated from the Hackatime production database by Sling."
        meta: { dagster: { deps: ['hackatime_warehouse_mirror'] } }

  - name: hackatime_legacy_raw
    schema: hackatime_legacy
    tables:
      - name: heartbeats
        description: "Raw heartbeat data replicated from the Hackatime Legacy database by Sling."
        meta: { dagster: { deps: ['hackatime_legacy_warehouse_mirror'] } }

  - name: loops
    schema: loops
    tables:
      - name: audience
        description: "Loops audience data loaded into warehouse via DLT"
        meta: { dagster: { deps: ['loops_audience'] } }

  - name: hcb
    schema: hcb
    tables:
      # Users & Activity
      - name: users
        description: "HCB users table."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      - name: user_seen_at_histories
        description: "HCB user session windows (period_start_at/period_end_at)."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      - name: organizer_positions
        description: "User-to-event permission mappings. Has deleted_at for soft deletes."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      # Core Financial Tables
      - name: events
        description: "Organizations/accounts on HCB. Has deleted_at for soft deletes."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      - name: event_plans
        description: "Plan types for events - used to identify HQ orgs."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      - name: canonical_transactions
        description: "Main transaction ledger - all financial transactions."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      - name: canonical_event_mappings
        description: "Links transactions to events (and optionally users)."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      - name: canonical_pending_transactions
        description: "Pending/unsettled transactions (checks awaiting deposit, etc.)."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      - name: canonical_pending_event_mappings
        description: "Links pending transactions to events."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      - name: canonical_pending_settled_mappings
        description: "Links pending transactions to their settled canonical transaction."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      - name: canonical_pending_declined_mappings
        description: "Marks pending transactions that were declined/cancelled."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      - name: fees
        description: "Fee records for transactions (10% HCB fee, etc.)."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      - name: hcb_codes
        description: "Unique transaction group identifiers (HCB-XXX-XXXXX format)."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      # Payment/Vendor Tables
      - name: disbursements
        description: "Internal transfers between HCB accounts."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      - name: ach_transfers
        description: "Outgoing ACH payments to external accounts."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      - name: donations
        description: "Incoming donations to HCB organizations."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      - name: wires
        description: "Outgoing wire transfers."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      - name: checks
        description: "Legacy check payments (deprecated, use increase_checks)."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      - name: increase_checks
        description: "Check payments via Increase."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      # Card/Authorization Tables
      - name: stripe_cards
        description: "Physical and virtual cards issued to users."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      - name: stripe_cardholders
        description: "Card holder records linked to users."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      - name: stripe_authorizations
        description: "Card authorization/transaction records."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      - name: card_grants
        description: "Card grants issued to users - funding for cards from org balance."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      # Tags/Metadata
      - name: tags
        description: "User-defined tags for transactions (per-event)."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      - name: event_tags
        description: "Global event tag definitions."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      - name: hcb_codes_tags
        description: "Join table linking hcb_codes to tags."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }
      # Receipts
      - name: receipts
        description: "Receipt attachments with AI-extracted merchant names, amounts, and memos."
        meta: { dagster: { deps: ['hcb_warehouse_mirror'] } }

  - name: slack
    schema: slack
    tables:
      - name: member_analytics_csv
        description: "Slack member analytics data from CSV export."
        meta: { dagster: { deps: ['slack_member_analytics_csv'] } }
      - name: member_analytics
        description: "Slack member analytics data."
        meta: { dagster: { deps: ['slack_member_analytics'] } }

  - name: fivetran_log
    schema: _fivetran_log
    tables:
      - name: log
        description: "Fivetran sync log events."
      - name: connection
        description: "Fivetran connector connections."

  - name: finance_2026
    schema: finance_2026
    tables:
      - name: major_gifts
        description: "Major gifts tracking for 2026 fundraising."
      - name: monthly_finances
        description: "Monthly finance summaries (expenses, other revenue, HQ interest)."
      - name: hcb_expense_reporting
        description: "HCB expense reporting with interest and grant revenue."

  - name: stasis
    schema: stasis
    tables:
      - name: user
        description: "Stasis users with hackatimeUserId linkage."
        meta: { dagster: { deps: ['stasis_warehouse_mirror'] } }
      - name: project
        description: "Stasis projects with githubRepo URLs."
        meta: { dagster: { deps: ['stasis_warehouse_mirror'] } }
      - name: hackatime_project
        description: "Stasis hackatime project name claims per project."
        meta: { dagster: { deps: ['stasis_warehouse_mirror'] } }
      - name: work_session
        description: "Stasis manual work sessions with hoursClaimed."
        meta: { dagster: { deps: ['stasis_warehouse_mirror'] } }

  - name: flavortown
    schema: flavortown
    tables:
      - name: users
        description: "Flavortown users."
        meta: { dagster: { deps: ['flavortown_warehouse_mirror'] } }
      - name: projects
        description: "Flavortown projects with repo_url."
        meta: { dagster: { deps: ['flavortown_warehouse_mirror'] } }
      - name: user_hackatime_projects
        description: "Flavortown user-to-hackatime-project mappings."
        meta: { dagster: { deps: ['flavortown_warehouse_mirror'] } }
      - name: user_identities
        description: "Flavortown user identity providers (hackatime uid linkage)."
        meta: { dagster: { deps: ['flavortown_warehouse_mirror'] } }
      - name: project_memberships
        description: "Flavortown project membership (user-to-project)."
        meta: { dagster: { deps: ['flavortown_warehouse_mirror'] } }
      - name: post_devlogs
        description: "Flavortown devlog entries with duration_seconds."
        meta: { dagster: { deps: ['flavortown_warehouse_mirror'] } }
      - name: posts
        description: "Flavortown posts linking devlogs to projects and users."
        meta: { dagster: { deps: ['flavortown_warehouse_mirror'] } }

  - name: horizons
    schema: horizons
    tables:
      - name: users
        description: "Horizons users with hackatime_account linkage."
        meta: { dagster: { deps: ['horizons_warehouse_mirror'] } }
      - name: projects
        description: "Horizons projects with now_hackatime_projects array and repo_url."
        meta: { dagster: { deps: ['horizons_warehouse_mirror'] } }

  - name: blueprint
    schema: blueprint
    tables:
      - name: users
        description: "Blueprint users."
        meta: { dagster: { deps: ['blueprint_warehouse_mirror'] } }
      - name: projects
        description: "Blueprint projects with repo_link."
        meta: { dagster: { deps: ['blueprint_warehouse_mirror'] } }
      - name: journal_entries
        description: "Blueprint journal entries with duration_seconds."
        meta: { dagster: { deps: ['blueprint_warehouse_mirror'] } }

  - name: airtable_sleepover
    schema: airtable_sleepover
    tables:
      - name: projects
        description: "Sleepover projects with hackatime_name (JSON array or plain text)."
        meta: { dagster: { deps: ['dlt_airtable_sleepover'] } }
      - name: registered_users
        description: "Sleepover registered users with email."
        meta: { dagster: { deps: ['dlt_airtable_sleepover'] } }
      - name: projects__registered_users
        description: "Sleepover project-to-registered-user junction table (DLT nested)."
        meta: { dagster: { deps: ['dlt_airtable_sleepover'] } }
      - name: ysws_project_submission
        description: "Sleepover YSWS project submissions with code_url."
        meta: { dagster: { deps: ['dlt_airtable_sleepover'] } }
      - name: _dlt_loads
        description: "DLT load metadata for tracking sleepover sync times."
        meta: { dagster: { deps: ['dlt_airtable_sleepover'] } }

  # Absolute minimum permissions - only columns needed to generate events for monthly active stats
  - name: auth
    schema: auth
    tables:
      - name: activities
        description: "Auth activity log (logins, profile updates, etc.). Minimal columns only."
        meta: { dagster: { deps: ['auth_warehouse_mirror'] } }
      - name: identities
        description: "Auth identities - only id and primary_email accessible."
        meta: { dagster: { deps: ['auth_warehouse_mirror'] } }
      - name: oauth_access_tokens
        description: "OAuth access tokens - only id, application_id, resource_owner_id accessible."
        meta: { dagster: { deps: ['auth_warehouse_mirror'] } }
      - name: oauth_applications
        description: "OAuth applications - only id, name, trust_level accessible."
        meta: { dagster: { deps: ['auth_warehouse_mirror'] } }
